<div class="space-y-4">
  <h3 class="section-kicker accent-teal text-sm">New Map Details</h3>
  <div>
    <label for="mapgroupid" class="field-label">Map group</label>
    <select required
            id="mapgroupid"
            class="field-input">
      {% for map_group in map_groups %}<option value="{{ map_group.id }}">{{ map_group.name }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label for="newmapname" class="field-label">Name</label>
    <input type="text"
           id="newmapname"
           class="field-input">
  </div>
  <div>
    <label for="newmapdescription" class="field-label">Description</label>
    <input type="text"
           id="newmapdescription"
           class="field-input">
  </div>
  <div>
    <label for="newmaprequiredgrant" class="field-label">Required Grant</label>
    <input type="text"
           id="newmaprequiredgrant"
           class="field-input"
           value="{{ default_required_grant }}">
  </div>
  <div class="flex justify-end">
    <button type="button"
         class="btn btn-teal"
          hx-post="{{ base_url }}/add/create"
          hx-ext="json-enc"
          hx-trigger="click"
          hx-vals='js:{"name": newmapname.value, "description": newmapdescription.value, "map_group_id": mapgroupid.value, "required_grant": newmaprequiredgrant.value, "form_data": collectBandFormData({{ band_id | tojson }})}'
          hx-target="closest .file-holder"
          hx-swap="innerHTML">Submit</button>
  </div>
</div>
