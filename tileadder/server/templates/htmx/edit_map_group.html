<div class="space-y-4">
  <div>
    <label for="group_name" class="field-label">Name</label>
  <input type="text"
         id="group_name"
         class="field-input"
         value="{{ map_group.name }}">
  </div>
  <div>
    <label for="description" class="field-label">Description</label>
  <input type="text"
         id="description"
         class="field-input"
         value="{{ map_group.description }}">
  </div>
  <div>
    <label for="grant" class="field-label">Required Grant (empty for public access, does not propagate to children)</label>
  <input type="text"
         id="grant"
         class="field-input"
         value="{{ map_group.grant or "" }}">
  </div>
  <button type="submit"
        class="btn btn-teal"
        hx-post="{{ base_url }}/current/groups/edit/{{ map_group.id }}"
        hx-ext="json-enc"
        hx-vals='js:{"description": description.value, "grant": grant.value, "group_name": group_name.value}'>Submit</button>
</div>
