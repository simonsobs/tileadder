<div class="space-y-4">
  <h3 class="section-kicker accent-orange text-sm">Add to Existing Map</h3>
  <div>
    <label for="mapgroupid" class="field-label">Map group</label>
    <select required
          id="mapgroupid"
          class="field-input"
          hx-get="{{ base_url }}/add/maps"
          name="map_group_id"
          hx-target="#mapid">
      <option disabled selected value>Select a map group</option>
      {% for map_group in map_groups %}<option value="{{ map_group.id }}">{{ map_group.name }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label for="mapid" class="field-label">Map name</label>
    <select id="mapid"
            class="field-input"></select>
  </div>
  <div class="flex justify-end">
    <button type="button"
            class="btn btn-teal"
            hx-post="{{ base_url }}/add/existing"
            hx-ext="json-enc"
            hx-trigger="click"
            hx-vals='js:{"map_id": mapid.value, "form_data": collectBandFormData({{ band_id | tojson }})}'
            hx-target="closest .file-holder"
            hx-swap="innerHTML">Submit</button>
  </div>
</div>
