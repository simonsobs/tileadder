<div class="space-y-4">
  <div>
    <label for="map_name" class="field-label">Name</label>
    <input type="text"
           id="map_name"
      class="field-input"
           value="{{ map.name }}">
  </div>
  <div>
    <label for="description" class="field-label">Description</label>
  <input type="text"
         id="description"
    class="field-input"
         value="{{ map.description }}">
  </div>
  <div>
    <label for="grant" class="field-label">Required Grant (empty for public access, propagates to children)</label>
  <input type="text"
         id="grant"
    class="field-input"
         value='{{ map.grant or "" }}'>
  </div>
  <button type="submit"
   class="btn btn-teal"
        hx-post="{{ base_url }}/current/maps/edit/{{ map.id }}"
        hx-ext="json-enc"
        hx-vals='js:{"description": description.value, "grant": grant.value, "map_name": map_name.value}'>Submit</button>
</div>
